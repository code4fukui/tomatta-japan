<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>泊まったジャパン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>泊まったジャパン</h1>
      <p class="lead">泊まったことがある都道府県を記録できます。</p>
    </section>

    <section class="panel map-panel" aria-labelledby="map-title">
      <div class="section-head">
        <div>
          <h2 id="map-title">都道府県</h2>
          <p id="visited-summary" class="summary">0 / 47</p>
        </div>
      </div>
      <japan-column-map id="map" base-color="#ecfeff"></japan-column-map>
    </section>

    <section class="panel" aria-labelledby="record-title">
      <div class="section-head">
        <h2 id="record-title">記録</h2>
      </div>
      <form id="record-form" class="form">
        <label>
          <span>都道府県</span>
          <select id="prefecture-input" required></select>
        </label>
        <label>
          <span>日付</span>
          <input id="datetime-input" type="date" required>
        </label>
        <label class="comment-field">
          <span>コメント</span>
          <input id="comment-input" type="text" maxlength="80" placeholder="ホテル名、旅のメモなど">
        </label>
        <div class="actions">
          <button type="submit">記録</button>
        </div>
      </form>
    </section>

    <section class="panel history-panel" aria-labelledby="history-title">
      <div class="section-head">
        <h2 id="history-title">履歴</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>都道府県</th>
              <th>コメント</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
      </div>
      <p id="history-empty" class="empty">まだ記録がありません。</p>
    </section>

    <div class="bottom-actions">
      <button type="button" id="reset-button" class="secondary">全削除</button>
    </div>
  </main>

  <template id="record-row-template">
    <tr>
      <td class="time-cell"></td>
      <td class="prefecture-cell"></td>
      <td class="comment-cell"></td>
      <td class="row-action">
        <button type="button" class="icon-button delete-button">削除</button>
      </td>
    </tr>
  </template>

  <footer class="page-footer">
    <a href="https://github.com/code4fukui/column-japan" target="_blank" rel="noreferrer">map by column-japan</a>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
